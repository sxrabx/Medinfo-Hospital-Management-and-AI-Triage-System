version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=qwen2
      - MEDICAL_MODEL_NAME=meditron:latest
      - VECTOR_DB_PATH=/app/data/vector_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ollama
    networks:
      - medical-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./data:/app/data
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - medical-network
    command: streamlit run streamlit_app.py --server.address=0.0.0.0

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - medical-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  ollama-data:

networks:
  medical-network:
    driver: bridge
