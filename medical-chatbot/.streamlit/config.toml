[theme]
primaryColor = "#667eea"
backgroundColor = "#f5f5f5"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
port = 8501
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
